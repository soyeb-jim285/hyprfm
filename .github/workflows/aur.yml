name: Update AUR

on:
  push:
    branches:
      - main

jobs:
  aur:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute pkgver
        id: pkgver
        run: |
          pkgver="r$(git rev-list --count HEAD).g$(git rev-parse --short HEAD)"
          echo "pkgver=$pkgver" >> "$GITHUB_OUTPUT"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo "Host aur.archlinux.org" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/aur" >> ~/.ssh/config
          echo "  User aur" >> ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/hyprfm-git.git aur-repo

      - name: Sync PKGBUILD from repo and update pkgver
        run: |
          cp PKGBUILD aur-repo/PKGBUILD
          cd aur-repo
          sed -i "s/^pkgver=.*/pkgver=$PKGVER/" PKGBUILD
          sed -i "s/pkgver = .*/pkgver = $PKGVER/" .SRCINFO
        env:
          PKGVER: ${{ steps.pkgver.outputs.pkgver }}

      - name: Push to AUR
        run: |
          cd aur-repo
          git config user.name "Soyeb Pervez Jim"
          git config user.email "soyebpervezjim@gmail.com"
          if git diff --quiet; then
            echo "No changes to push"
            exit 0
          fi
          git add PKGBUILD .SRCINFO
          git commit -m "bump pkgver to $PKGVER"
          git push
        env:
          PKGVER: ${{ steps.pkgver.outputs.pkgver }}
